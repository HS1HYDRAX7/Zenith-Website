<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/led-dot-matrix" rel="stylesheet">

<style>
*,
*::before,
*::after{
box-sizing:border-box;
margin:0;
padding:0;
user-select:none;
-webkit-user-drag:none;
-webkit-tap-highlight-color: transparent;
outline:none;
}

body{
font-family:'LED Dot-Matrix',sans-serif;
background:radial-gradient(circle at top,#120000,#0b0b0b 70%);
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

:root{
--accent:#ff0000;
--accent2:#8a0000;
--bg:#0b0b0b;
--card:#140000;
--border:#2a0000;
--radius:22px;
--text:#ffffff;
--muted:#9a9a9a;
}

.navbar{
width:100%;
max-width:1100px;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
z-index:10;
}

.nav-left{
font-size:20px;
letter-spacing:2px;
}

.nav-right{
display:flex;
gap:30px;
}

.nav-item{
cursor:pointer;
position:relative;
font-size:14px;
}

.nav-item::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:var(--accent);
transition:.3s;
}

.nav-item:hover::after{
width:100%;
}

.section{
width:100%;
max-width:1100px;
padding:20px;
display:none;
}

.active{
display:block;
}

.footer,
.footer *{
font-family:'Poppins', sans-serif !important;
}

#loadingScreen{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader{
--cell-size:52px;
--cell-spacing:2px;
display:flex;
flex-wrap:wrap;
width:170px;
height:170px;
}

.cell{
flex:0 0 var(--cell-size);
margin:var(--cell-spacing);
border-radius:6px;
animation:1.4s ripple ease infinite;
}

.cell.d-1{animation-delay:100ms;}
.cell.d-2{animation-delay:200ms;}
.cell.d-3{animation-delay:300ms;}
.cell.d-4{animation-delay:400ms;}

.cell:nth-child(1){--cell-color:#ff0000;}
.cell:nth-child(2){--cell-color:#e00000;}
.cell:nth-child(3){--cell-color:#c00000;}
.cell:nth-child(4){--cell-color:#ff1a1a;}
.cell:nth-child(5){--cell-color:#ff3333;}
.cell:nth-child(6){--cell-color:#cc0000;}
.cell:nth-child(7){--cell-color:#ff4d4d;}
.cell:nth-child(8){--cell-color:#990000;}
.cell:nth-child(9){--cell-color:#ff6666;}

@keyframes ripple{
0%{background:transparent;}
30%{background:var(--cell-color);}
60%{background:transparent;}
100%{background:transparent;}
}

.wrapper{
width:100%;
max-width:1100px;
display:flex;
flex-direction:column;
align-items:center;
}

#mainContent{
opacity:0;
transform:scale(.9);
}

.show{
animation:popIn .6s ease forwards;
}

@keyframes popIn{
to{
opacity:1;
transform:scale(1);
}
}

.buttons{
margin-top:40px;
width:100%;
max-width:500px;
display:flex;
flex-direction:column;
gap:18px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
width:100%;
padding:18px;
border-radius:999px;
background:linear-gradient(135deg,#1a0000,#120000);
border:1px solid var(--border);
cursor:pointer;
transition:.25s;
}

.btn img{
height:24px;
}

.btn:hover{
transform:translateY(-3px) scale(1.02);
background:linear-gradient(135deg,#2a0000,#180000);
box-shadow:0 10px 30px rgba(255,0,0,.25);
}

.grid{
margin-top:50px;
width:100%;
display:grid;
grid-template-columns:1fr;
gap:30px;
}

.card{
    width:100%;
    max-width:500px;
    margin:auto;
    border-radius:var(--radius);
    overflow:hidden;
    background:linear-gradient(180deg,#1a0000,#0a0000);
    border:1px solid var(--border);
    animation:fadeUp .8s ease;
}

.card-header{
display:flex;
align-items:center;
padding:10px 14px;
background:#110000;
gap:6px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.title{
margin-left:10px;
font-size:12px;
color:var(--muted);
}

.card-body{
    padding:18px;
    font-family:monospace;
    font-size:13px;
    color:#d0d0d0;
    background:#080000;
    word-break:break-word;
}

.card-footer{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-top:1px solid var(--border);
}

.copy-btn{
border:none;
padding:10px 22px;
border-radius:16px;
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
font-size:12px;
cursor:pointer;
transition:.25s;
}

.copy-btn:hover{
transform:scale(1.07);
box-shadow:0 0 18px rgba(255,0,0,.5);
}

.copy-btn.copied{
background:#27c93f;
}

.changelog{
margin-top:18px;
padding:20px;
border-radius:18px;
background:linear-gradient(180deg,#140000,#080000);
border:1px solid #2a0000;
font-size:13px;
line-height:1.6;
color:#d0d0d0;
}

.changelog-title{
font-size:14px;
margin-bottom:10px;
color:white;
}

.changelog ul{
list-style:none;
}

.games-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
margin-top:30px;
}

.game-card{
height:200px;
border-radius:var(--radius);
overflow:hidden;
position:relative;
background:#000;
border:1px solid var(--border);
}

.game-bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
filter:brightness(.6);
}

.game-title{
position:absolute;
bottom:10px;
left:10px;
right:10px;
font-size:14px;
z-index:2;
}
</style>
</head>

<body>

<div id="loadingScreen">
<div class="loader">
<div class="cell d-1"></div>
<div class="cell d-2"></div>
<div class="cell d-3"></div>
<div class="cell d-4"></div>
<div class="cell d-1"></div>
<div class="cell d-2"></div>
<div class="cell d-3"></div>
<div class="cell d-4"></div>
<div class="cell d-1"></div>
</div>
</div>

<div class="navbar">
<div class="nav-left">ZENITH</div>
<div class="nav-right">
<div class="nav-item" onclick="switchTab('home')">HOME</div>
<div class="nav-item" onclick="switchTab('games')">SUPPORTED GAMES</div>
</div>
</div>

<div class="wrapper" id="mainContent">

<div id="home" class="section active">

<div class="buttons">
<div class="btn" onclick="window.open('https://discord.gg/G82NFt4Qnp')">
<img src="https://raw.githubusercontent.com/HS1HYDRAX7/Zenith-Website/refs/heads/main/sources/discord.png">
Discord
</div>

<div class="btn" onclick="window.open('https://www.tiktok.com/@atlasscriptss')">
<img src="https://raw.githubusercontent.com/HS1HYDRAX7/Zenith-Website/refs/heads/main/sources/tktk.png">
TikTok
</div>
</div>

<div class="grid">
<div>
<div class="card">
<div class="card-header">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div class="title">loader.lua</div>
</div>

<div class="card-body">
loadstring(game:HttpGet("https://raw.githubusercontent.com/HS1HYDRAX7/Elysium-X-Rework/refs/heads/main/Elysium%20X%20Rework"))()
</div>

<div class="card-footer">
<button class="copy-btn" id="copyBtn">Copy</button>
</div>
</div>

<div class="changelog">
<div class="changelog-title">CHANGELOG</div>
<ul>
<li>• Fixed ESP</li>
<li></li>
</ul>
</div>
</div>
</div>

</div>

<div id="games" class="section">
<div class="games-grid" id="gamesGrid"></div>
</div>

</div>

<script>
const sections={
home:document.getElementById("home"),
games:document.getElementById("games")
};

function switchTab(tab){
for(let k in sections){
sections[k].classList.remove("active");
}
sections[tab].classList.add("active");
}

const scriptText=`loadstring(game:HttpGet("https://raw.githubusercontent.com/HS1HYDRAX7/Elysium-X-Rework/refs/heads/main/Elysium%20X%20Rework"))()`;

const copyBtn=document.getElementById("copyBtn");

copyBtn.onclick=async()=>{
try{
await navigator.clipboard.writeText(scriptText);
}catch{
const t=document.createElement("textarea");
t.value=scriptText;
document.body.appendChild(t);
t.select();
document.execCommand("copy");
t.remove();
}

copyBtn.innerText="Copied!";
copyBtn.classList.add("copied");

setTimeout(()=>{
copyBtn.innerText="Copy";
copyBtn.classList.remove("copied");
},1500);
};

const grid=document.getElementById("gamesGrid");

function SG(data){
const card=document.createElement("div");
card.className="game-card";

const bg=document.createElement("div");
bg.className="game-bg";
bg.style.backgroundImage=`url(${data.Thumbnail})`;
bg.style.backgroundSize="cover";
bg.style.backgroundPosition="center";

const title=document.createElement("div");
title.className="game-title";
title.innerText=data.Title;

card.appendChild(bg);
card.appendChild(title);

grid.appendChild(card);
}

setTimeout(()=>{
const loader=document.getElementById("loadingScreen");
const content=document.getElementById("mainContent");

loader.style.opacity="0";
loader.style.transition="0.5s";

SG({
Title:"FLICK",
Thumbnail:"https://tr.rbxcdn.com/180DAY-8ed2a086bd24394c0f49267e90f0ae42/768/432/Image/Webp/noFilter",
});
    
SG({
Title:"DIE OF DEATH",
Thumbnail:"https://tr.rbxcdn.com/180DAY-27ae7e96d54cffb1ec1388363b723a33/768/432/Image/Webp/noFilter",
});

setTimeout(()=>{
loader.style.display="none";
content.classList.add("show");
},500);

},5000);
</script>

</body>
</html>
